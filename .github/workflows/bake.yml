name: RSS Ops Baker

on:
  schedule:
    - cron: '10,40 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install feedparser
        run: pip install feedparser
      - name: Run Builder
        run: python builder.py
      - name: Commit and Push
        run: |
          git config --global user.name "RSS-Bot"
          git config --global user.email "bot@ctvm.local"
          git add data.json
          git commit -m "Update feed data" || exit 0
          git pull --rebase
          git push
