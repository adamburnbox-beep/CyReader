<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTVM // INTELLIGENCE FEED</title>
    <style>
        :root {
            --bg: #050505;
            --surface: #0f0f0f;
            --border: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #999999;
            --accent: #ff3e3e;
            --accent-glow: rgba(255, 62, 62, 0.4);
            --success: #00ff88;
            --success-glow: rgba(0, 255, 136, 0.4);
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 2rem;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1.5rem;
        }

        .logo {
            font-weight: 900;
            font-size: 1.8rem;
            letter-spacing: -1px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #fff, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-container {
            text-align: right;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* Redesigned Dashboard */
        #dashboard {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
            margin-bottom: 4rem;
            background: linear-gradient(145deg, #0f0f0f, #0a0a0a);
            border: 1px solid var(--border);
            padding: 2rem;
            border-radius: 8px;
        }

        .global-stat {
            border-right: 1px solid var(--border);
            padding-right: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .global-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .global-value {
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1;
            margin: 0.5rem 0;
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
        }

        .global-new {
            color: var(--success);
            text-shadow: 0 0 20px var(--success-glow);
        }

        .global-total {
            font-size: 1.2rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .source-activity {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-content: flex-start;
        }

        .source-chip {
            background: #1a1a1a;
            border: 1px solid var(--border);
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            transition: all 0.2s ease;
            color: var(--text-secondary);
        }

        .source-chip.has-updates {
            border-color: var(--success);
            color: var(--text-primary);
            background: rgba(0, 255, 136, 0.05);
        }

        .source-chip.has-updates .indicator {
            background: var(--success);
            box-shadow: 0 0 8px var(--success-glow);
            animation: pulse-dot 2s infinite;
        }

        .source-chip.has-error {
            border-color: var(--accent);
            opacity: 0.7;
        }

        .source-chip.has-error .indicator {
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .source-chip .indicator {
            width: 6px;
            height: 6px;
            background: #333;
            border-radius: 50%;
        }

        .source-chip:hover {
            background: #252525;
            border-color: var(--text-secondary);
            cursor: pointer;
        }

        @keyframes pulse-dot {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Feed Grid Styles */
        #grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .card:hover {
            border-color: var(--accent);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
            transform: scale(1.01);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 2px;
            height: 0;
            background: var(--accent);
            transition: height 0.4s ease;
        }

        .card:hover::before {
            height: 100%;
        }

        .meta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            text-transform: uppercase;
        }

        .title {
            font-size: 1.2rem;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 1rem;
            color: var(--text-primary);
            text-decoration: none;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .title:hover {
            color: var(--accent);
        }

        .summary {
            font-size: 0.9rem;
            color: var(--text-secondary);
            flex-grow: 1;
        }

        .new-badge {
            background: var(--success);
            color: #000;
            padding: 0 4px;
            font-size: 0.6rem;
            font-weight: 900;
            margin-left: 8px;
            border-radius: 2px;
            vertical-align: middle;
        }

        @media (max-width: 900px) {
            #dashboard { grid-template-columns: 1fr; }
            .global-stat { border-right: none; border-bottom: 1px solid var(--border); padding-right: 0; padding-bottom: 2rem; }
        }

        @media (max-width: 600px) {
            body { padding: 1rem; }
            #grid { grid-template-columns: 1fr; }
        }

        /* Enhanced Filter Section */
        .controls-container {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 2rem;
            align-items: flex-start;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .control-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            justify-content: space-between;
        }

        .search-input {
            background: #151515;
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.6rem 1rem;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            width: 100%;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .date-input {
            background: #151515;
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.5rem;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            width: 100%;
            box-sizing: border-box;
        }

        .vendor-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .vendor-tag {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            font-size: 0.65rem;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .vendor-tag:hover {
            border-color: var(--text-primary);
            color: var(--text-primary);
        }

        .vendor-tag.active {
            background: var(--accent-glow);
            border-color: var(--accent);
            color: var(--text-primary);
        }

        @media (max-width: 1000px) {
            .controls-container { grid-template-columns: 1fr 1fr; }
        }

        @media (max-width: 700px) {
            .controls-container { grid-template-columns: 1fr; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <div class="logo">CyReader <span style="font-weight: 300; opacity: 0.5;">// INTEL</span></div>
    <div class="status-container">
        <div>SYSTEM STATUS: ACTIVE</div>
        <div id="status">LAST FETCH: --:--:--</div>
    </div>
</header>

<div id="dashboard">
    <div class="global-stat">
        <div class="global-label">TOTAL NEW INTEL</div>
        <div class="global-value">
            <span id="total-new" class="global-new">+0</span>
            <span id="total-articles" class="global-total">/ 0</span>
        </div>
    </div>
    <div id="source-activity" class="source-activity">
        <!-- Source chips will be injected here -->
    </div>
</div>

<div class="controls-container">
    <div class="control-group">
        <label class="control-label">SEARCH INTEL <span>[TITLE/VENDOR]</span></label>
        <input type="text" id="search-query" class="search-input" placeholder="Type to search..." oninput="updateFilters()">
    </div>
    
    <div class="control-group">
        <label class="control-label">FILTER VENDORS <span>[MULTI-SELECT]</span></label>
        <div id="vendor-tags" class="vendor-tags">
            <!-- Vendor tags will be injected here -->
        </div>
    </div>

    <div class="control-group">
        <label class="control-label">PUBLISHED SINCE <span>[DATE]</span></label>
        <input type="date" id="date-since" class="date-input" onchange="updateFilters()">
    </div>
</div>

<div id="grid">
    <!-- Articles will be injected here -->
</div>

<script>
    let cachedData = null;
    let selectedVendors = new Set();
    let searchQuery = '';
    let dateSince = '';

    function updateFilters() {
        searchQuery = document.getElementById('search-query').value.toLowerCase();
        dateSince = document.getElementById('date-since').value;
        renderUI();
    }

    function toggleVendor(vendor) {
        if (selectedVendors.has(vendor)) {
            selectedVendors.delete(vendor);
        } else {
            selectedVendors.add(vendor);
        }
        renderUI();
    }

    function markSourceAsRead(sourceName) {
        const readRegistry = JSON.parse(localStorage.getItem('cyreader_read_registry') || '{}');
        readRegistry[sourceName] = Date.now() / 1000; 
        localStorage.setItem('cyreader_read_registry', JSON.stringify(readRegistry));
        renderUI();
    }

    function renderUI() {
        if (!cachedData) return;

        const sourceActivity = document.getElementById('source-activity');
        const grid = document.getElementById('grid');
        const totalNewEl = document.getElementById('total-new');
        const totalArticlesEl = document.getElementById('total-articles');
        const vendorTagsContainer = document.getElementById('vendor-tags');

        const readRegistry = JSON.parse(localStorage.getItem('cyreader_read_registry') || '{}');
        const now = Date.now() / 1000;

        // Render Vendors Multi-select
        const allVendors = [...new Set(cachedData.stats.map(s => s.vendor))].sort();
        vendorTagsContainer.innerHTML = allVendors.map(v => `
            <div class="vendor-tag ${selectedVendors.has(v) ? 'active' : ''}" onclick="toggleVendor('${v}')">
                ${v}
            </div>
        `).join('');

        // Apply Filters
        const filteredStats = cachedData.stats.filter(s => {
            const vendorMatch = selectedVendors.size === 0 || selectedVendors.has(s.vendor);
            const searchMatch = !searchQuery || s.source.toLowerCase().includes(searchQuery) || s.vendor.toLowerCase().includes(searchQuery);
            return vendorMatch && searchMatch;
        });
        
        const filteredArticles = cachedData.articles.filter(a => {
            const vendorMatch = selectedVendors.size === 0 || selectedVendors.has(a.vendor);
            const searchMatch = !searchQuery || 
                               a.title.toLowerCase().includes(searchQuery) || 
                               a.vendor.toLowerCase().includes(searchQuery) ||
                               a.source.toLowerCase().includes(searchQuery);
            
            let dateMatch = true;
            if (dateSince) {
                const filterTime = new Date(dateSince).getTime() / 1000;
                dateMatch = a.timestamp >= filterTime;
            }

            return vendorMatch && searchMatch && dateMatch;
        });

        // Calculate Stats based on filtered data
        let totalNew = 0;
        // We only count "new" from sources that match the current filters
        filteredStats.forEach(stat => {
            const lastReadAt = readRegistry[stat.source] || 0;
            // Count unread articles for this source that ALSO pass the other filters (date, search)
            const unreadCount = filteredArticles.filter(a => a.source === stat.source && a.timestamp > lastReadAt).length;
            if (unreadCount > 0) totalNew += unreadCount;
        });

        totalNewEl.innerText = `+${totalNew}`;
        totalArticlesEl.innerText = `/ ${filteredArticles.length}`;
        totalNewEl.classList.toggle('global-new', totalNew > 0);

        // Render Chips
        sourceActivity.innerHTML = filteredStats.map(stat => {
            const lastReadAt = readRegistry[stat.source] || 0;
            const unreadCount = filteredArticles.filter(a => a.source === stat.source && a.timestamp > lastReadAt).length;
            const hasUnreadUpdates = unreadCount > 0;
            const isError = stat.status === 'error';
            
            let chipClass = '';
            if (hasUnreadUpdates) chipClass = 'has-updates';
            if (isError) chipClass = 'has-error';

            return `
                <div class="source-chip ${chipClass}" onclick="markSourceAsRead('${stat.source.replace(/'/g, "\\'")}')">
                    <div class="indicator"></div>
                    <span>${stat.source}${isError ? ' [ERR]' : ''} ${hasUnreadUpdates ? `(${unreadCount})` : ''}</span>
                </div>
            `;
        }).join('');

        // Render Grid
        grid.innerHTML = filteredArticles.map(item => {
            const lastReadAt = readRegistry[item.source] || 0;
            const isUnread = item.timestamp > lastReadAt;
            const isVeryRecent = (now - item.timestamp) < (24 * 60 * 60);
            const badge = (isUnread && isVeryRecent) ? `<span class="new-badge">NEW</span>` : '';
            const diffHours = Math.floor((now - item.timestamp) / 3600);
            const timeString = diffHours === 0 ? "JUST NOW" : `${diffHours}H AGO`;

            return `
                <div class="card">
                    <div class="meta">
                        <span>${item.source} [${item.vendor}]</span>
                        <span>${timeString}${badge}</span>
                    </div>
                    <a href="${item.link}" target="_blank" class="title">${item.title}</a>
                    <div class="summary">${item.summary}</div>
                </div>
            `;
        }).join('');

        const lastUpdatedText = cachedData.last_updated ? new Date(cachedData.last_updated * 1000).toLocaleTimeString() : '--:--:--';
        document.getElementById('status').innerText = `LAST FETCH: ${lastUpdatedText}`;
    }

    async function loadFeed() {
        try {
            const response = await fetch(`data.json?t=${Date.now()}`);
            cachedData = await response.json();
            renderUI();
        } catch (error) {
            console.error(error);
            document.getElementById('status').innerText = "SYSTEM ERR: DATA_LOAD_FAILED";
        }
    }

    loadFeed();
</script>

</body>
</html>
